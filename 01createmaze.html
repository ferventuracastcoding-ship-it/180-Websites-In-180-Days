<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pixel Maze Generator</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    background:#111;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
}


h1{
    margin:25px;
    color:#00ffcc;
}


.controls{
    margin:20px;
}


button{
    padding:12px 25px;
    background:#ff0066;
    color:white;
    border:none;
    cursor:pointer;
    font-size:18px;
    border-radius:5px;
}


button:hover{
    background:#00ffcc;
    color:black;
}


#maze{

    margin:auto;
    display:grid;
    border:5px solid #00ffcc;
    box-shadow:0 0 20px #00ffcc;

}


.cell{

    background:#222;
}


.wall{

    background:#000;

}


.path{

    background:#00ff88;

}


.start{

    background:#0066ff;

}


.end{

    background:#ff0000;

}



@media(max-width:600px){

#maze{
    width:95vw;
    height:95vw;
}

}

</style>

</head>


<body>


<h1>🧩 PIXEL MAZE GENERATOR</h1>


<div class="controls">

<button onclick="generateMaze()">
GENERATE MAZE
</button>

</div>



<div id="maze"></div>




<script>


const rows=21;
const cols=21;

let maze=[];



function createGrid(){

maze=[];


for(let r=0;r<rows;r++){

maze[r]=[];

for(let c=0;c<cols;c++){

maze[r][c]=1;

}

}

}




function generateMaze(){


createGrid();


carve(1,1);


draw();


}




function carve(r,c){


maze[r][c]=0;


let directions=[

[2,0],
[-2,0],
[0,2],
[0,-2]

];


directions.sort(()=>Math.random()-0.5);



for(let d of directions){


let nr=r+d[0];
let nc=c+d[1];


if(
nr>0 &&
nr<rows-1 &&
nc>0 &&
nc<cols-1 &&
maze[nr][nc]===1
){

maze[r+d[0]/2][c+d[1]/2]=0;

carve(nr,nc);


}


}


}




function draw(){


let container=document.getElementById("maze");


container.innerHTML="";


container.style.gridTemplateColumns=
`repeat(${cols},1fr)`;


container.style.width="500px";
container.style.height="500px";



for(let r=0;r<rows;r++){

for(let c=0;c<cols;c++){


let cell=document.createElement("div");


cell.className="cell";


if(maze[r][c]===1){

cell.classList.add("wall");

}
else{

cell.classList.add("path");

}



if(r===1 && c===1){

cell.className="cell start";
cell.innerHTML="🚀";

}


if(r===rows-2 && c===cols-2){

cell.className="cell end";
cell.innerHTML="🏁";

}



container.appendChild(cell);


}


}



}



generateMaze();


</script>


</body>
</html>
