<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Creative Drawing Studio</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}


body{

    background:#f2f2f2;
    display:flex;
    flex-direction:column;
    min-height:100vh;

}


header{

    background:#222;
    color:white;
    text-align:center;
    padding:25px;

}


header h1{

    color:#00bfa6;
    font-size:35px;

}



.toolbar{

    background:white;
    padding:15px;
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
    box-shadow:0 5px 15px rgba(0,0,0,.1);

}


button,input{

    padding:10px 15px;
    border-radius:8px;
    border:1px solid #aaa;

}


button{

    background:#00bfa6;
    color:white;
    border:none;
    cursor:pointer;

}


button:hover{

    background:#008f7a;

}



canvas{

    background:white;
    margin:30px auto;
    border:3px solid #222;
    border-radius:15px;
    cursor:crosshair;

    box-shadow:0 10px 25px rgba(0,0,0,.2);

}



footer{

    margin-top:auto;
    text-align:center;
    background:#222;
    color:white;
    padding:20px;

}


</style>

</head>


<body>


<header>

<h1>🎨 Creative Drawing Studio</h1>

<p>Create your own digital artwork</p>

</header>




<div class="toolbar">


<label>
Color:
<input type="color" id="color" value="#000000">
</label>


<label>
Brush:
<input type="range" id="size" min="1" max="50" value="5">
</label>



<button onclick="clearCanvas()">
Clear
</button>


<button onclick="eraser()">
Eraser
</button>


<button onclick="saveImage()">
Save Drawing
</button>


</div>





<canvas id="canvas"></canvas>





<footer>

HTML • CSS • JavaScript Canvas Drawing App

</footer>





<script>


const canvas=document.getElementById("canvas");

const ctx=canvas.getContext("2d");


canvas.width=Math.min(window.innerWidth-40,900);

canvas.height=500;


let painting=false;

let color="#000000";

let brushSize=5;



canvas.addEventListener(
"mousedown",
start
);


canvas.addEventListener(
"mouseup",
stop
);


canvas.addEventListener(
"mousemove",
draw
);



document.getElementById("color")
.oninput=(e)=>{

color=e.target.value;

}



document.getElementById("size")
.oninput=(e)=>{

brushSize=e.target.value;

}




function start(e){

painting=true;

draw(e);

}



function stop(){

painting=false;

ctx.beginPath();

}



function draw(e){


if(!painting)return;


let rect=canvas.getBoundingClientRect();


let x=e.clientX-rect.left;

let y=e.clientY-rect.top;



ctx.lineWidth=brushSize;

ctx.lineCap="round";

ctx.strokeStyle=color;



ctx.lineTo(x,y);

ctx.stroke();

ctx.beginPath();

ctx.moveTo(x,y);


}




function clearCanvas(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

}



function eraser(){

color="white";

}



function saveImage(){

let link=document.createElement("a");

link.download="my-drawing.png";

link.href=canvas.toDataURL();

link.click();

}



</script>


</body>
</html>
