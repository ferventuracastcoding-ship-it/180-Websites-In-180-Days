<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Carl Jung Books Explorer</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f1a;
  color: white;
}

/* HEADER */
header {
  text-align: center;
  padding: 30px 15px;
  background: linear-gradient(90deg, #1a1f3c, #0b0f1a);
}

h1 {
  margin: 0;
  font-size: 2rem;
}

p {
  opacity: 0.8;
}

/* BUTTON */
button {
  margin-top: 15px;
  padding: 10px 18px;
  border: none;
  background: cyan;
  color: black;
  font-weight: bold;
  cursor: pointer;
  border-radius: 8px;
}

button:hover {
  background: #00e6e6;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
  padding: 20px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 12px;
  text-align: center;
  transition: transform 0.3s, border 0.3s;
}

.card:hover {
  transform: scale(1.05);
  border-color: cyan;
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 10px;
}

/* TITLE */
.card h3 {
  font-size: 14px;
  margin: 10px 0 5px;
}

.card p {
  font-size: 12px;
  opacity: 0.7;
}

/* LOADER */
.loader {
  text-align: center;
  padding: 20px;
  display: none;
}

/* MOBILE */
@media (max-width: 600px) {
  h1 {
    font-size: 1.5rem;
  }

  .card img {
    height: 180px;
  }
}
</style>
</head>

<body>

<header>
  <h1>📚 Carl Jung Book Explorer</h1>
  <p>Live API fetching all available works by Carl Jung</p>
  <button onclick="loadBooks()">Refresh Books</button>
</header>

<div class="loader" id="loader">Loading books...</div>

<div class="container" id="books"></div>

<script>
const API_URL = "https://openlibrary.org/search.json?author=Carl%20Jung";

async function loadBooks() {
  const container = document.getElementById("books");
  const loader = document.getElementById("loader");

  container.innerHTML = "";
  loader.style.display = "block";

  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    loader.style.display = "none";

    data.docs.forEach(book => {
      const title = book.title || "Unknown Title";
      const year = book.first_publish_year || "N/A";
      const coverId = book.cover_i;

      const cover = coverId
        ? `https://covers.openlibrary.org/b/id/${coverId}-L.jpg`
        : "https://via.placeholder.com/300x400?text=No+Cover";

      const card = document.createElement("div");
      card.classList.add("card");

      card.innerHTML = `
        <img src="${cover}" alt="${title}" />
        <h3>${title}</h3>
        <p>First Published: ${year}</p>
      `;

      container.appendChild(card);
    });

  } catch (error) {
    loader.innerText = "Failed to load books.";
    console.error(error);
  }
}

// initial load
loadBooks();
</script>

</body>
</html>
